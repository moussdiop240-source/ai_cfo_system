name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  PYTHONDONTWRITEBYTECODE: 1
  PYTHONUNBUFFERED: 1

jobs:
  # ── Linting ────────────────────────────────────────────────────────────────
  lint:
    name: Lint (ruff)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install ruff
        run: pip install ruff==0.4.4

      - name: Run ruff
        run: ruff check . --select E,F,W --ignore E501,E402,W291,W293 --exclude ".git,__pycache__,data,dashboards"

  # ── Unit tests (SQLite, no external services) ──────────────────────────────
  unit-tests:
    name: Unit Tests (SQLite)
    runs-on: ubuntu-latest
    needs: lint

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements-dev.txt

      - name: Run unit tests with coverage
        env:
          LLM_BACKEND: "ollama"          # no real LLM in CI — all LLM calls mocked
          DATABASE_URL: "sqlite:///./test_ci.db"
          PGVECTOR_URL: ""               # empty → SQLite vector store
        run: |
          python -m pytest tests/ \
            --ignore=tests/smoke_test.py \
            --ignore=tests/test_rag_pgvector.py \
            --tb=short -q \
            --cov=backend \
            --cov-report=term-missing \
            --cov-report=xml:coverage.xml \
            --cov-fail-under=60

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-report
          path: coverage.xml

  # ── Smoke tests (deterministic end-to-end, no LLM, no DB) ─────────────────
  smoke-tests:
    name: Smoke Tests
    runs-on: ubuntu-latest
    needs: unit-tests

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements-dev.txt

      - name: Run smoke tests
        env:
          LLM_BACKEND: "ollama"
          DATABASE_URL: "sqlite:///./test_ci.db"
        run: python -m pytest tests/smoke_test.py -v --tb=short

  # ── Integration tests (PostgreSQL + pgvector) ──────────────────────────────
  integration-pgvector:
    name: Integration Tests (pgvector)
    runs-on: ubuntu-latest
    needs: unit-tests

    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_DB: ai_cfo_test
          POSTGRES_USER: cfo_user
          POSTGRES_PASSWORD: cfo_pass
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements-dev.txt

      - name: Initialize pgvector schema
        env:
          PGPASSWORD: cfo_pass
        run: |
          psql -h localhost -U cfo_user -d ai_cfo_test \
            -f backend/database/migrations/init.sql

      - name: Index knowledge base into pgvector
        env:
          PGVECTOR_URL: "postgresql://cfo_user:cfo_pass@localhost:5432/ai_cfo_test"
        run: python scripts/index_knowledge_base.py

      - name: Run pgvector integration tests
        env:
          LLM_BACKEND: "ollama"
          PGVECTOR_URL: "postgresql://cfo_user:cfo_pass@localhost:5432/ai_cfo_test"
          DATABASE_URL: "postgresql://cfo_user:cfo_pass@localhost:5432/ai_cfo_test"
        run: |
          python -m pytest tests/test_rag_pgvector.py -v --tb=short

  # ── Docker build + push (ghcr.io) ─────────────────────────────────────────
  docker:
    name: Docker Build & Push
    runs-on: ubuntu-latest
    needs: lint
    permissions:
      contents: read
      packages: write   # required to push to ghcr.io

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        if: github.event_name == 'push' && github.ref == 'refs/heads/master'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build (PR) / Build & Push (master)
        uses: docker/build-push-action@v5
        with:
          context: .
          push: ${{ github.event_name == 'push' && github.ref == 'refs/heads/master' }}
          tags: |
            ghcr.io/${{ github.repository }}:latest
            ghcr.io/${{ github.repository }}:sha-${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ── Security scan ──────────────────────────────────────────────────────────
  security-scan:
    name: Security Scan (bandit)
    runs-on: ubuntu-latest
    needs: lint

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install bandit
        run: pip install bandit[toml]==1.7.9

      - name: Run bandit security scan
        run: |
          bandit -r backend/ \
            --exclude backend/rag/knowledge_base.py \
            -ll \
            --skip B101,B311 \
            -f txt
