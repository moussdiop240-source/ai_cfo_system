apiVersion: apps/v1
kind: Deployment
metadata:
  name: ai-cfo-api
  namespace: ai-cfo
  labels:
    app: ai-cfo-api
spec:
  replicas: 2
  selector:
    matchLabels:
      app: ai-cfo-api
  template:
    metadata:
      labels:
        app: ai-cfo-api
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1001
      containers:
        - name: api
          # CI pushes ghcr.io/moussdiop240-source/ai_cfo_system:sha-<commit> on every master merge.
          # For production rollouts pin to the specific SHA tag; :latest is updated on every push.
          image: ghcr.io/moussdiop240-source/ai_cfo_system:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8000
          envFrom:
            - configMapRef:
                name: ai-cfo-config
            - secretRef:
                name: ai-cfo-secrets
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 20
            periodSeconds: 30
            timeoutSeconds: 10
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 15
            timeoutSeconds: 5
            failureThreshold: 2
          resources:
            requests:
              cpu: "250m"
              memory: "512Mi"
            limits:
              cpu: "2000m"
              memory: "2Gi"
          volumeMounts:
            - name: data
              mountPath: /data
      volumes:
        - name: data
          emptyDir: {}
      initContainers:
        - name: migrate
          image: ghcr.io/moussdiop240-source/ai_cfo_system:latest
          command: ["python", "-m", "alembic", "upgrade", "head"]
          envFrom:
            - configMapRef:
                name: ai-cfo-config
            - secretRef:
                name: ai-cfo-secrets
