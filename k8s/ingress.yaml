# Ingress — exposes the AI CFO API externally via an nginx ingress controller.
#
# Prerequisites:
#   kubectl apply -f https://raw.githubusercontent.com/kubernetes/ingress-nginx/controller-v1.10.1/deploy/static/provider/cloud/deploy.yaml
#
# TLS is managed by cert-manager with Let's Encrypt.
# Install cert-manager:
#   kubectl apply -f https://github.com/cert-manager/cert-manager/releases/download/v1.14.5/cert-manager.yaml
#
# Replace ai-cfo.example.com with your actual domain before applying.
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: ai-cfo-ingress
  namespace: ai-cfo
  annotations:
    nginx.ingress.kubernetes.io/proxy-body-size: "10m"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "120"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "120"
    # Rate limiting at the ingress layer (backs the slowapi limits in-app)
    nginx.ingress.kubernetes.io/limit-rps: "50"
    # TLS via cert-manager + Let's Encrypt
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
spec:
  ingressClassName: nginx
  tls:
    - hosts:
        - ai-cfo.example.com
      secretName: ai-cfo-tls
  rules:
    - host: ai-cfo.example.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: ai-cfo-api
                port:
                  number: 80
