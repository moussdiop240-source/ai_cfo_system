[pytest]
testpaths = tests
python_files = test_*.py smoke_test.py
python_classes = Test*
python_functions = test_*

# Show short tracebacks for fast iteration; use -v for full detail
addopts =
    --tb=short
    --strict-markers
    -q

markers =
    unit: Pure unit tests — no I/O, no network
    integration: Tests that touch SQLite DB or filesystem
    security: Security-focused tests (injection, auth, audit)
    slow: Tests that take > 5 seconds (excluded from fast CI)

# Do not warn about unraisable exceptions from background threads in tests
filterwarnings =
    ignore::DeprecationWarning:sqlalchemy.*:
    ignore::DeprecationWarning:langgraph.*:
    ignore::PendingDeprecationWarning
